# Copy to ~/.deepseek/automations/<id>.json fields, or use scripts/run-baidu-hotsearch-once.sh
#
# SMTP + IMAP share ~/.deepseek/automation/email.toml (see automation-email.example.toml)

# --- email.toml (SMTP section example) ---
# [default]
# smtp_host = "smtp.qq.com"
# smtp_port = 587
# smtp_starttls = true
# from_addr = "you@qq.com"
# username = "you@qq.com"
# password_env = "DEEPSEEK_EMAIL_PASSWORD"
# to_addr = "you@qq.com"   # optional default; delivery.to overrides

# --- automation record (POST /v1/automations or trigger body) ---
# name = "baidu-hotsearch-email"
# rrule = "FREQ=HOURLY;INTERVAL=24"   # manual run_now for first test
# delivery.mode = "email"
# delivery.to = "your@email.com"
