openapi: 3.1.0
info:
  title: DeepSeek Workbench Runtime API
  version: 0.1.0
  description: Rust-parity HTTP/SSE surface consumed by packages/workbench.
servers:
  - url: http://127.0.0.1:7878
paths:
  /health:
    get:
      summary: Liveness probe for GUI startup
      responses:
        "200":
          description: OK
  /healthz:
    get:
      summary: Legacy health alias
      responses:
        "200":
          description: OK
  /v1/threads:
    get:
      summary: List threads (bare array)
      parameters:
        - name: include_archived
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Thread list
    post:
      summary: Create thread (bare object, 201)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model:
                  type: string
                workspace:
                  type: string
                mode:
                  type: string
                allow_shell:
                  type: boolean
                trust_mode:
                  type: boolean
                auto_approve:
                  type: boolean
      responses:
        "201":
          description: Created thread
  /v1/threads/import-session:
    post:
      summary: Import TUI session JSON into a new thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_id:
                  type: string
                  description: Session id under ~/.deepseek/sessions/
                path:
                  type: string
                  description: Absolute path to session JSON file
                workspace:
                  type: string
                title:
                  type: string
                model:
                  type: string
                mode:
                  type: string
      responses:
        "201":
          description: Imported thread
        "400":
          description: Invalid session payload
        "404":
          description: Session file not found
  /v1/threads/summary:
    get:
      summary: Thread counts summary
      responses:
        "200":
          description: Summary object
  /v1/threads/{thread_id}:
    get:
      summary: Thread detail with turns, items, latest_seq
      parameters:
        - $ref: "#/components/parameters/threadId"
      responses:
        "200":
          description: Detail
        "404":
          description: Thread not found
    patch:
      summary: Update thread (title, archived)
      parameters:
        - $ref: "#/components/parameters/threadId"
      responses:
        "200":
          description: Updated thread
        "404":
          description: Thread not found
  # DELETE intentionally omitted: archive flows through PATCH archived=true.
  # The runtime never exposed DELETE as a real delete (would have been a
  # destructive action without backups); the GUI uses PATCH instead.
  /v1/threads/{thread_id}/fork:
    post:
      summary: Fork thread
      parameters:
        - $ref: "#/components/parameters/threadId"
      responses:
        "201":
          description: Forked thread
        "404":
          description: Thread not found
  /v1/threads/{thread_id}/rewind:
    post:
      summary: Truncate thread in place at before_item_id
      description: >
        Drops the item and everything after it from the durable store.
        With restore_files=true the dropped turns' workspace files are also
        rolled back to their pre-turn state (per-turn file checkpoints) before
        truncation. Emits thread.rewound with restored_files / skipped_files.
      parameters:
        - $ref: "#/components/parameters/threadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [before_item_id]
              properties:
                before_item_id:
                  type: string
                restore_files:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Rewound thread
        "400":
          description: Item not found in thread / turn active
        "404":
          description: Thread not found
  /v1/threads/{thread_id}/restore-code:
    post:
      summary: Restore workspace files to before_item_id, conversation intact
      description: >
        Rolls files mutated by the cutoff turn and later turns back to their
        pre-turn state and consumes those turns' checkpoints. Conversation
        records are not touched.
      parameters:
        - $ref: "#/components/parameters/threadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [before_item_id]
              properties:
                before_item_id:
                  type: string
      responses:
        "200":
          description: Restore report
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread_id:
                    type: string
                  before_item_id:
                    type: string
                  restored_files:
                    type: array
                    items:
                      type: string
                  skipped_files:
                    type: array
                    items:
                      type: string
                  turns_without_checkpoint:
                    type: array
                    items:
                      type: string
                  turns:
                    type: integer
        "400":
          description: Item not found in thread / turn active
        "404":
          description: Thread not found
  /v1/threads/{thread_id}/rewind-preview:
    get:
      summary: Preview files a rewind/restore to before_item_id would touch
      description: >
        Aggregates the per-turn checkpoints of the cutoff turn and later
        turns. files lists every mutated path (including skipped ones);
        skipped is the subset whose pre-image cannot be resolved (non-git
        workspace without recorded content); turns is the number of affected
        turns; no_checkpoint counts affected turns that have no checkpoint
        (nothing recoverable for them).
      parameters:
        - $ref: "#/components/parameters/threadId"
        - name: before_item_id
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Preview
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: string
                  skipped:
                    type: array
                    items:
                      type: string
                  is_git:
                    type: boolean
                  turns:
                    type: integer
                  no_checkpoint:
                    type: integer
        "400":
          description: Item not found in thread
        "404":
          description: Thread not found
  /v1/threads/{thread_id}/resume:
    post:
      summary: Resume / warm thread engine
      parameters:
        - $ref: "#/components/parameters/threadId"
      responses:
        "200":
          description: Thread detail
        "404":
          description: Thread not found
  /v1/threads/{thread_id}/turns:
    post:
      summary: Start turn
      parameters:
        - $ref: "#/components/parameters/threadId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
                model:
                  type: string
                reasoning_effort:
                  type: string
                  nullable: true
                mode:
                  type: string
                allow_shell:
                  type: boolean
                trust_mode:
                  type: boolean
                auto_approve:
                  type: boolean
      responses:
        "201":
          description: Thread + turn
        "404":
          description: Thread not found
        "409":
          description: Turn conflict
  /v1/threads/{thread_id}/turns/{turn_id}/interrupt:
    post:
      summary: Interrupt active turn
      parameters:
        - $ref: "#/components/parameters/threadId"
        - $ref: "#/components/parameters/turnId"
      responses:
        "200":
          description: Turn record
        "409":
          description: Turn not active
  /v1/threads/{thread_id}/turns/{turn_id}/steer:
    post:
      summary: Steer active turn
      parameters:
        - $ref: "#/components/parameters/threadId"
        - $ref: "#/components/parameters/turnId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt]
              properties:
                prompt:
                  type: string
      responses:
        "200":
          description: Turn record
        "409":
          description: Turn not active
  /v1/threads/{thread_id}/compact:
    post:
      summary: Compact thread context
      parameters:
        - $ref: "#/components/parameters/threadId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason recorded on the compact turn
      responses:
        "200":
          description: Turn record
        "404":
          description: Thread not found
        "409":
          description: Turn conflict
  /v1/threads/{thread_id}/events:
    get:
      summary: SSE event stream
      parameters:
        - $ref: "#/components/parameters/threadId"
        - name: since_seq
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: text/event-stream
        "404":
          description: Thread not found
  /v1/approvals/pending:
    get:
      summary: List pending tool approvals (optional thread filter)
      parameters:
        - name: thread_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Pending approval list
  /v1/approvals/{approval_id}:
    post:
      summary: Resolve pending tool approval
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [allow, deny, approve, reject]
                remember:
                  type: boolean
      responses:
        "200":
          description: Decision recorded
        "400":
          description: Invalid decision
        "404":
          description: Approval not pending
  /v1/user-inputs/pending:
    get:
      summary: List pending interactive user-input prompts
      parameters:
        - name: thread_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Pending user-input list
  /v1/user-inputs/{request_id}:
    post:
      summary: Answer interactive user-input prompt
      parameters:
        - $ref: "#/components/parameters/requestId"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                answers:
                  type: array
                  items:
                    type: object
                cancelled:
                  type: boolean
      responses:
        "200":
          description: Accepted
        "404":
          description: Request not found
  /v1/user-input/{request_id}:
    post:
      summary: Alias for user-inputs route
      parameters:
        - $ref: "#/components/parameters/requestId"
      responses:
        "200":
          description: Accepted
        "404":
          description: Request not found
  /v1/sessions:
    get:
      summary: Unified TUI session files + Workbench thread catalog
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Session catalog with import/link metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  dir:
                    type: string
                  sessions:
                    type: array
                    items:
                      type: object
  /v1/threads/{thread_id}/export-session:
    post:
      summary: Export Workbench thread to TUI session JSON
      parameters:
        - $ref: "#/components/parameters/threadId"
        - name: session_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Exported session file path and ids
        "400":
          description: Thread has no exportable messages
        "404":
          description: Thread not found
  /v1/skills:
    get:
      summary: Discovered skills for settings/diagnostics
      parameters:
        - name: workspace
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Skill registry snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      type: object
                  warnings:
                    type: array
                    items:
                      type: string
        "503":
          description: Skill discovery failed
  /v1/tasks:
    get:
      summary: List durable background tasks
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Task list wrapper
          content:
            application/json:
              schema:
                type: object
                required: [tasks]
                properties:
                  tasks:
                    type: array
                    items:
                      type: object
        "503":
          description: Task manager not configured
  /v1/tasks/{task_id}:
    get:
      summary: Get task by id
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task record
        "404":
          description: Task not found
        "503":
          description: Task manager not configured
  /v1/tasks/{task_id}/cancel:
    post:
      summary: Cancel a running or queued task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated task record
        "404":
          description: Task not found
        "503":
          description: Task manager not configured
  /v1/workspace/status:
    get:
      summary: Workspace diagnostics for settings UI
      responses:
        "200":
          description: Status object with runtime_api and workspace blocks
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  runtime_api:
                    type: object
                    properties:
                      mode:
                        type: string
                      service:
                        type: string
                      python_version:
                        type: string
                  workspace:
                    type: object
        "503":
          description: Runtime not configured
components:
  parameters:
    threadId:
      name: thread_id
      in: path
      required: true
      schema:
        type: string
    turnId:
      name: turn_id
      in: path
      required: true
      schema:
        type: string
    requestId:
      name: request_id
      in: path
      required: true
      schema:
        type: string
