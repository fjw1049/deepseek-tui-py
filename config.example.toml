provider = "deepseek"
model = "deepseek-v4-pro"

# Web search: AnySearch (optional key) + Tavily (optional key); results are merged.
# anysearch_api_key = ""   # or ANYSEARCH_API_KEY
# tavily_api_key = ""      # or TAVILY_API_KEY

[providers.deepseek]
base_url = "https://api.deepseek.com"
timeout = 120

[ui]
color_scheme = "default"
show_thinking = true

[state]
database_path = "~/.deepseek_tui/state.db"
autosave = true

[features]
tasks = true
automations = true

# Cross-project memory.md (manual/hybrid). Smart memory is separate.
[memory]
enabled = false
mode = "hybrid"   # manual | auto | hybrid

[memory.smart]
enabled = false
# data_dir = ""   # default ~/.deepseek/memory_data
recall_enabled = true
capture_enabled = true
recall_timeout_ms = 5000
recall_score_threshold = 0.3
capture_min_user_chars = 20
l1_every_n = 5
l1_warmup_enabled = true
l1_idle_timeout_seconds = 600
l1_confidence_min = 0.6
# Max L1 rows inserted per extraction batch.
# Long-running threads continue learning across later batches.
l1_max_per_session = 20
l2_enabled = true
l2_delay_after_l1_seconds = 90
l2_min_interval_seconds = 900
l2_max_interval_seconds = 3600
l2_session_active_window_hours = 24
l2_max_scenes = 15
l3_persona_llm_enabled = true
l3_persona_interval = 50
l1_decay_half_life_days = 180
# 0 disables TTL cleanup. When enabled, L0/L1 rows older than this are removed.
retention_days = 0
cleanup_on_start = false
l1_inject_position = "user"
hybrid_search = true
fts_tokenizer = "auto"   # auto | simple | jieba (pip install jieba)
# embedding_backfill_on_start = false
# embedding_provider = "none"   # none | openai
# embedding_model = "text-embedding-3-small"
# embedding_base_url = "https://api.example.com"
# embedding_api_key = ""        # or DEEPSEEK_EMBEDDING_API_KEY
# embedding_dimensions = 3072   # optional; model default if omitted
# embedding_dedup_threshold = 0.92
# P2 tools (registered when memory.smart.enabled): memory_search, conversation_search

# Baidu hot search → email (see scripts/run-baidu-hotsearch-once.sh)
[automation]
mail_to = "you@example.com"

[automation.email]
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_starttls = true
username = "you@example.com"
from_addr = "you@example.com"
password_env = "DEEPSEEK_EMAIL_PASSWORD"
