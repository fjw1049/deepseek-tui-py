provider = "deepseek"
model = "deepseek-v4-pro"

# Web search: AnySearch (optional key) + Tavily (optional key); results are merged.
# anysearch_api_key = ""   # or ANYSEARCH_API_KEY
# tavily_api_key = ""      # or TAVILY_API_KEY

[providers.deepseek]
base_url = "https://api.deepseek.com"
timeout = 120

# Custom OpenAI-compatible provider example. Models the built-in table
# doesn't recognize default to a 500K context window; set context_window
# to the model's real limit to override (e.g. 1000000 for a 1M model).
# [providers.my-provider]
# protocol = "openai"
# base_url = "https://api.example.com/v1"
# api_key = "sk-..."
# model = "glm-5.2"
# context_window = 1000000
#
# Multi-model endpoints can set a window per model (the Workbench settings
# UI writes this table automatically):
# [providers.my-provider.context_windows]
# "glm-5.2" = 1000000
# "glm-5.2-air" = 500000

[ui]
color_scheme = "default"
show_thinking = true
# Reply + UI language: "zh" (default) or "en". Workbench Settings syncs this.
locale = "zh"

[state]
database_path = "~/.deepseek_tui/state.db"
autosave = true

[features]
tasks = true
automations = true

[post_turn]
enabled = true

[evolution]
enabled = false
mode = "suggest"
review_model = ""
review_max_steps = 8
flush_min_user_turns = 6
flush_timeout_s = 30.0
notify = true

[evolution.curated]
enabled = true
# dir = ""  # default ~/.deepseek/memories
memory_char_limit = 2200
user_char_limit = 1375

[evolution.procedural]
enabled = true
default_scope = "project"

[evolution.schedulers]
memory_nudge_every_n = 10
skill_nudge_tool_rounds = 10
review_idle_timeout_seconds = 600
min_tool_calls_signal = 5

[evolution.ledger]
enabled = true
retain_days = 90
memory_curate = "auto"
skill_patch = "auto"
skill_create = "propose"

[evolution.sinks]
trajectory_enabled = false
# trajectory_path = "~/.deepseek/trajectories"

# Baidu hot search → email (see scripts/run-baidu-hotsearch-once.sh)
[automation]
mail_to = "you@example.com"

[automation.email]
smtp_host = "smtp.example.com"
smtp_port = 587
smtp_starttls = true
username = "you@example.com"
from_addr = "you@example.com"
password_env = "DEEPSEEK_EMAIL_PASSWORD"
